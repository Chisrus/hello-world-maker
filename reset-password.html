<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nouveau mot de passe | Agrikura</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="auth.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
</head>
<body>
    <nav class="navbar">
        <a href="/" class="logo">Agrikura<span class="dot">.</span></a>
    </nav>

    <main class="auth-page">
        <div class="auth-card">
            <div class="auth-header">
                <h1>Nouveau mot de passe</h1>
                <p>Choisissez votre nouveau mot de passe</p>
            </div>
            <form id="reset-form" class="auth-form">
                <div class="form-group">
                    <label for="new-password">Nouveau mot de passe</label>
                    <input type="password" id="new-password" placeholder="••••••••" required minlength="6">
                </div>
                <div class="form-group">
                    <label for="confirm-password">Confirmer</label>
                    <input type="password" id="confirm-password" placeholder="••••••••" required minlength="6">
                </div>
                <button type="submit" class="btn-primary auth-btn" id="btn-save">Enregistrer</button>
                <div id="reset-message" class="auth-message"></div>
            </form>
        </div>
    </main>

    <script type="module">
        import { supabase } from './db.js';

        // Check for recovery event
        supabase.auth.onAuthStateChange(async (event) => {
            if (event === 'PASSWORD_RECOVERY') {
                document.getElementById('reset-form').style.display = 'block';
            }
        });

        const form = document.getElementById('reset-form');
        const msg = document.getElementById('reset-message');
        const btn = document.getElementById('btn-save');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const pw = document.getElementById('new-password').value;
            const confirm = document.getElementById('confirm-password').value;
            if (pw !== confirm) {
                msg.textContent = '❌ Les mots de passe ne correspondent pas.';
                msg.classList.add('error');
                return;
            }
            btn.disabled = true;
            btn.textContent = 'Enregistrement...';
            msg.textContent = '';
            msg.className = 'auth-message';
            try {
                const { error } = await supabase.auth.updateUser({ password: pw });
                if (error) throw error;
                msg.textContent = '✅ Mot de passe mis à jour ! Redirection...';
                msg.classList.add('success');
                btn.textContent = 'Terminé ✓';
                setTimeout(() => window.location.href = '/login.html', 2000);
            } catch (err) {
                msg.textContent = '❌ ' + err.message;
                msg.classList.add('error');
                btn.disabled = false;
                btn.textContent = 'Enregistrer';
            }
        });
    </script>
</body>
</html>
