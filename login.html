<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion Admin | Agrikura</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="auth.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&display=swap" rel="stylesheet">
</head>
<body>
    <nav class="navbar">
        <a href="/" class="logo">Agrikura<span class="dot">.</span></a>
        <ul class="nav-links">
            <li><a href="/">Accueil</a></li>
            <li><a href="/marketplace.html">Marketplace</a></li>
        </ul>
    </nav>

    <main class="auth-page">
        <div class="auth-card">
            <div class="auth-header">
                <h1>Connexion</h1>
                <p>Accédez à votre espace d'administration</p>
            </div>
            <form id="login-form" class="auth-form">
                <div class="form-group">
                    <label for="email">Email</label>
                    <input type="email" id="email" placeholder="votre@email.com" required>
                </div>
                <div class="form-group">
                    <label for="password">Mot de passe</label>
                    <input type="password" id="password" placeholder="••••••••" required minlength="6">
                </div>
                <button type="submit" class="btn-primary auth-btn" id="btn-login">Se Connecter</button>
                <div id="auth-message" class="auth-message"></div>
            </form>
            <div id="forgot-password-section" style="display:none;" class="auth-form">
                <p style="margin-bottom:12px;color:#666;">Entrez votre email pour recevoir un lien de réinitialisation.</p>
                <div class="form-group">
                    <label for="reset-email">Email</label>
                    <input type="email" id="reset-email" placeholder="votre@email.com" required>
                </div>
                <button type="button" class="btn-primary auth-btn" id="btn-reset">Envoyer le lien</button>
                <div id="reset-message" class="auth-message"></div>
                <p style="margin-top:12px;text-align:center;"><a href="#" id="back-to-login">← Retour à la connexion</a></p>
            </div>
            <div class="auth-footer">
                <p><a href="#" id="forgot-link">Mot de passe oublié ?</a></p>
                <p>Pas encore de compte ? <a href="/register.html">Créer un compte</a></p>
            </div>
        </div>
    </main>

    <script type="module">
        import { connexion, getUser } from './auth.js';
        import { supabase } from './db.js';

        (async () => {
            const user = await getUser();
            if (user) {
                const redirect = new URLSearchParams(window.location.search).get('redirect') || '/dashboard.html';
                window.location.href = redirect;
            }
        })();

        const form = document.getElementById('login-form');
        const msg = document.getElementById('auth-message');
        const btn = document.getElementById('btn-login');
        const forgotSection = document.getElementById('forgot-password-section');
        const forgotLink = document.getElementById('forgot-link');
        const backToLogin = document.getElementById('back-to-login');

        forgotLink.addEventListener('click', (e) => {
            e.preventDefault();
            form.style.display = 'none';
            forgotSection.style.display = 'block';
        });

        backToLogin.addEventListener('click', (e) => {
            e.preventDefault();
            form.style.display = 'block';
            forgotSection.style.display = 'none';
        });

        document.getElementById('btn-reset').addEventListener('click', async () => {
            const email = document.getElementById('reset-email').value;
            const resetMsg = document.getElementById('reset-message');
            const resetBtn = document.getElementById('btn-reset');
            if (!email) { resetMsg.textContent = '❌ Entrez votre email.'; resetMsg.classList.add('error'); return; }
            resetBtn.disabled = true;
            resetBtn.textContent = 'Envoi...';
            resetMsg.textContent = '';
            resetMsg.className = 'auth-message';
            try {
                const { error } = await supabase.auth.resetPasswordForEmail(email, {
                    redirectTo: window.location.origin + '/reset-password.html'
                });
                if (error) throw error;
                resetMsg.textContent = '✅ Lien envoyé ! Vérifiez votre boîte mail.';
                resetMsg.classList.add('success');
                resetBtn.textContent = 'Email envoyé ✉️';
            } catch (err) {
                resetMsg.textContent = '❌ ' + err.message;
                resetMsg.classList.add('error');
                resetBtn.disabled = false;
                resetBtn.textContent = 'Envoyer le lien';
            }
        });

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            btn.disabled = true;
            btn.textContent = 'Connexion...';
            msg.textContent = '';
            msg.className = 'auth-message';
            try {
                await connexion(
                    document.getElementById('email').value,
                    document.getElementById('password').value
                );
                msg.textContent = '✅ Connexion réussie ! Redirection...';
                msg.classList.add('success');
                const redirect = new URLSearchParams(window.location.search).get('redirect') || '/dashboard.html';
                setTimeout(() => window.location.href = redirect, 1000);
            } catch (err) {
                msg.textContent = '❌ ' + (err.message === 'Invalid login credentials' ? 'Email ou mot de passe incorrect.' : err.message);
                msg.classList.add('error');
                btn.disabled = false;
                btn.textContent = 'Se Connecter';
            }
        });
    </script>
</body>
</html>
